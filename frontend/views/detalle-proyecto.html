<!-- views/detalle-proyecto.html -->
<div class="container mt-4">
  <!-- BOTONES DE ACCIÓN - Debajo del detalle -->
  <div class="d-flex justify-content-end gap-2 mt-4 p-3" style="background-color: rgba(0, 0, 0, 0.15); border-radius: 8px;">
    <button class="btn btn-secondary btn-action" onclick="cargarVista('mis-proyectos')" style="margin-right: auto;">
      <i class="bi bi-arrow-left"></i> Volver
    </button>
    
    <button id="btnEditarProyecto" class="btn btn-editar btn-action" style="display: none;" onclick="mostrarSeccionEditar()">
      <i class="bi bi-pencil"></i> Editar
    </button>
    
    <button id="btnTomarDecision" class="btn btn-decidir btn-action" style="display: none;" onclick="mostrarSeccionDecision()">
      <i class="bi bi-clipboard-check"></i> Tomar Decisión
    </button>
  </div>

  <!-- LAYOUT DE DOS COLUMNAS -->
  <div class="project-detail-layout">
    
    <!-- COLUMNA PRINCIPAL -->
    <div class="project-main-info">
      <h3 id="detalleTitulo" class="mb-4"></h3>
      
      <div class="mb-4">
        <div class="info-label mb-2">DESCRIPCIÓN</div>
        <p id="detalleDescripcion" class="info-value" style="line-height: 1.6;"></p>
      </div>

      <div class="info-row">
        <div class="info-label">Estado</div>
        <div><span id="detalleEstado" class="badge bg-primary"></span></div>
      </div>

      <div class="info-row">
        <div class="info-label">Creado por</div>
        <div class="info-value" id="detalleCreadoPor"></div>
      </div>

      <div class="info-row">
        <div class="info-label">Área</div>
        <div class="info-value"><span id="detalleArea" data-area-id=""></span></div>
      </div>

      <div class="info-row">
        <div class="info-label">Tipo</div>
        <div class="info-value"><span id="detalleTipo" data-tipo-id=""></span></div>
      </div>

      <div class="info-row">
        <div class="info-label">Monto Estimado</div>
        <div class="info-value">$<span id="detalleMonto"></span></div>
      </div>

      <div class="info-row">
        <div class="info-label">Duración</div>
        <div class="info-value"><span id="detalleDuracion"></span> días</div>
      </div>
    </div>

    <!-- COLUMNA LATERAL - PASOS DE APROBACIÓN -->
    <div class="project-sidebar">
      <div class="card">
        <div class="card-body">
          <h5 class="mb-3">
            <i class="bi bi-list-check"></i> Pasos de Aprobación
          </h5>
          <div id="detallePasos">
            <!-- Se llena dinámicamente con mejor formato -->
          </div>
        </div>
      </div>
    </div>
  </div>

<!-- SECCIÓN TOMAR DECISIÓN -->
<div id="seccionDecision" style="display: none;">
  <div style="max-width: 500px; margin: 0 auto;">
    <h4>
      <i class="bi bi-clipboard-check"></i> Tomar Decisión sobre este Proyecto
    </h4>
    
    <div class="mb-3">
      <label for="selectEstado" class="form-label">Decisión *</label>
      <select id="selectEstado" class="form-select" required>
        <option value="2">Aprobar</option>
        <option value="3">Rechazar</option>
        <option value="4">Observar</option>
      </select>
    </div>
    
    <div class="mb-3">
      <label for="inputObservaciones" class="form-label">Observaciones</label>
      <textarea id="inputObservaciones" class="form-control" rows="3" 
                placeholder="Escriba sus observaciones aquí..."></textarea>
    </div>

    <div class="d-flex justify-content-between mt-3">
      <button class="btn btn-secondary" onclick="ocultarSeccionDecision()" 
              style="min-width: 120px; max-width: 150px;">
        <i class="bi bi-x-circle"></i> Cancelar
      </button>
      <button class="btn btn-naranja" onclick="tomarDecisionDesdeFormulario()" 
              style="min-width: 140px; max-width: 180px;">
        <i class="bi bi-check-circle"></i> Enviar Decisión
      </button>
    </div>
  </div>
</div>

<!-- SECCIÓN EDITAR PROYECTO -->
<div id="seccionEditar" style="display: none;">
  <div style="max-width: 500px; margin: 0 auto;">
    <h4>
      <i class="bi bi-pencil"></i> Editar Proyecto
    </h4>
    
    <div class="alert alert-warning mb-3">
      <small>
        <i class="bi bi-info-circle"></i> <strong>Nota:</strong> 
        Solo puede modificar: título, descripción y duración.
      </small>
    </div>

    <form id="formEditarProyecto" onsubmit="event.preventDefault(); guardarCambiosProyecto();">
      <div class="mb-3">
        <label for="inputTituloEdit" class="form-label">Título *</label>
        <input type="text" id="inputTituloEdit" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="inputDescripcionEdit" class="form-label">Descripción *</label>
        <textarea id="inputDescripcionEdit" class="form-control" rows="2" required></textarea>
      </div>

      <div class="mb-3">
        <label for="inputDuracionEdit" class="form-label">Duración (días) *</label>
        <input type="number" id="inputDuracionEdit" class="form-control" min="1" required />
      </div>

      <div class="d-flex justify-content-between mt-3">
        <button type="button" class="btn btn-secondary" onclick="ocultarSeccionEditar()" 
                style="min-width: 120px; max-width: 150px;">
          <i class="bi bi-x-circle"></i> Cancelar
        </button>
        <button type="submit" class="btn btn-naranja" 
                style="min-width: 140px; max-width: 180px;">
          <i class="bi bi-check-circle"></i> Guardar Cambios
        </button>
      </div>
    </form>
  </div>
</div>

<script>
(function() {
  console.log(">>> Ejecutando script de detalle-proyecto");
  
  setTimeout(function() {
    const proyectoId = localStorage.getItem('proyectoId');
    console.log(">>> Proyecto ID:", proyectoId);
    
    if (proyectoId) {
      cargarDetalleProyecto(proyectoId);
    } else {
      console.error("No hay proyectoId en localStorage");
    }
  }, 100);
})();

function mostrarSeccionDecision() {
  const seccion = document.getElementById("seccionDecision");
  seccion.style.display = "block";
  
  // Scroll suave hacia la sección
  seccion.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function ocultarSeccionDecision() {
  document.getElementById("seccionDecision").style.display = "none";
}

function mostrarSeccionEditar() {
  const seccion = document.getElementById("seccionEditar");
  seccion.style.display = "block";
  
  // Cargar valores actuales en el formulario
  const proyectoData = JSON.parse(localStorage.getItem('proyectoEditando') || '{}');
  
  if (proyectoData.titulo) {
    document.getElementById("inputTituloEdit").value = proyectoData.titulo;
    document.getElementById("inputDescripcionEdit").value = proyectoData.descripcion;
    document.getElementById("inputDuracionEdit").value = proyectoData.duracion;
  }
  
  // Scroll suave hacia la sección
  seccion.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function ocultarSeccionEditar() {
  document.getElementById("seccionEditar").style.display = "none";
}
</script>
